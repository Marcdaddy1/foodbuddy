# FoodBuddy — local Supabase configuration
# Minimal valid config for `supabase start`. Add sections as features are enabled.

project_id = "foodbuddy"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
# Local email testing server (captures auth emails in dev).
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:5173"
# Capacitor apps load from capacitor://localhost (iOS) and http://localhost (Android).
additional_redirect_urls = [
  "http://localhost:5173",
  "capacitor://localhost",
  "http://localhost",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Social providers are disabled locally by default.
# Enable by filling env vars and flipping `enabled = true`.
[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
redirect_uri = ""

[auth.external.apple]
enabled = false
client_id = "env(SUPABASE_AUTH_APPLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_APPLE_SECRET)"
redirect_uri = ""
